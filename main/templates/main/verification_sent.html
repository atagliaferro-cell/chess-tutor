<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | Chess Tutor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 76% 18%, rgba(58, 220, 88, 0.18), transparent 34%),
                radial-gradient(circle at 18% 78%, rgba(58, 220, 88, 0.08), transparent 32%),
                #050806;
            color: #f4f7f2;
        }

        .card {
            max-width: 520px;
            padding: 36px;
            border: 1px solid rgba(99, 240, 111, 0.3);
            border-radius: 10px;
            background: linear-gradient(145deg, rgba(5, 24, 10, 0.96), rgba(2, 10, 6, 0.98));
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.48), 0 0 48px rgba(82, 226, 98, 0.15);
        }

        h1 {
            margin-bottom: 14px;
            font-size: 34px;
        }

        h1 span,
        a {
            color: #63f06f;
        }

        p {
            color: #c6d0c3;
            font-size: 17px;
            line-height: 1.6;
        }

        a {
            display: inline-flex;
            align-items: center;
            min-height: 44px;
            margin-top: 24px;
            padding: 0 18px;
            border: 1px solid rgba(99, 240, 111, 0.45);
            border-radius: 6px;
            background: rgba(99, 240, 111, 0.08);
            font-weight: 900;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Check Your <span>Email.</span></h1>
        <p>
            Your account has been created, but you need to verify your email before you can log in.
            Open the email from Chess Tutor and click the verification link.
        </p>
        <a href="{% url 'login' %}">Go to Login</a>
    </main>
</body>
</html>
